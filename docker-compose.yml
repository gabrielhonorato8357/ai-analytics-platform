services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analytics_password}
      POSTGRES_DB: ${POSTGRES_DB:-analytics_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analytics} -d ${POSTGRES_DB:-analytics_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-analytics}:${POSTGRES_PASSWORD:-analytics_password}@postgres:5432/${POSTGRES_DB:-analytics_platform}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:${WEB_PORT:-3000}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-32-byte-minimum}
      AI_SQL_PROVIDER: ${AI_SQL_PROVIDER:-disabled}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MAX_QUERY_ROWS: ${MAX_QUERY_ROWS:-500}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL:-admin@example.com}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-change-me-admin-password}
      FIRST_SUPERUSER_NAME: ${FIRST_SUPERUSER_NAME:-Platform Administrator}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_PORT:-8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
